name: "DIY Lint"

on:
  push:
    branches:
      - "**"
      - "!release"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "Check formatting"
        run: ./fbt lint_all
